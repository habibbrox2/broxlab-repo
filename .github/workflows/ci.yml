name: CI

on:
  push:
    branches:
      - push
      - 'releases/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build + Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint JS
        run: npm run lint

      - name: Build assets
        run: npm run build

      - name: List build output (sanity)
        run: ls -la public_html/assets || true
